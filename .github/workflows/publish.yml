name: CI & Publish

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install sidecar dependencies
        run: cd sidecar && bun install --frozen-lockfile

      - name: Install dashboard dependencies
        run: cd dashboard && bun install --frozen-lockfile

      - name: Run sidecar tests
        run: cd sidecar && bun test

      - name: Build dashboard
        run: cd dashboard && bun run build

      - name: Verify plugin structure
        run: |
          test -f index.ts
          test -f openclaw.plugin.json
          test -f dashboard/dist/index.html
          echo "Plugin structure OK"

      - name: Check if version changed
        id: version
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @omnixal/openclaw-nats-plugin version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $LOCAL_VERSION (npm has $NPM_VERSION)"
          fi

      - name: Publish to npm
        if: steps.version.outputs.skip == 'false'
        run: npm publish --access public --provenance

      - name: Tag release
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v$VERSION"
          git push origin "v$VERSION"
